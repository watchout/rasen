id: haleimo
name: ハレイモ
status: long_term
category: agriculture / D2C brand / organic sweet potato

one_liner: 無農薬・無化学肥料・循環型農業で育てたさつまいもを通じて、日本の食と子どもたちの未来を守る農業ブランド。

target:
  primary:
    - 子育て世代
    - 無添加・無農薬志向の家庭
    - 高所得層のギフト需要
    - 日本の食や地域再生に共感する人
  conditions:
    - 安心して子どもに食べさせられる食を求めている
    - 量よりも思想・品質・物語を重視する

main_pain:
  - 安心して買える農産物が少ない
  - 子どもに食べさせるものに不安がある
  - 生産者の顔や思想が見えない
  - 地域や農地の未来に関心はあるが関わり方がない

dream_outcome: 安心して子どもに食べさせられる日本産の食を、信頼できる生産者から継続的に受け取れる状態にする。

offer_seed: 無農薬・循環型農業で育てた希少さつまいもを、理解してくれる人にだけ届ける会員制ブランド。

price_seed:
  raw_sweet_potato_per_kg: 3000
  dried_sweet_potato_300g: 2000
  currency: JPY

lead_magnet_seed:
  - 子どもに安心して食べさせたいおやつ選びガイド
  - ハレイモの畑だより
  - 放棄地再生ストーリー

backend_seed:
  - 会員制定期便
  - ギフト商品
  - デジタル図鑑 / 絵本
  - 海外向けクラウドファンディング

cta: ハレイモを応援する
