id: mieru-board
name: ミエルボード / ミエルシリーズ
status: focus
category: field visibility OS

one_liner: ホワイトボード・LINE・Excelに散らばった「人・モノ・車・報告」の見えないを、30日で1枚の現場業務ボードにまとめる現場見える化OS。

positioning:
  core_phrase: 現場の「どこいった？」をなくす
  not_a: 安いスケジュール管理アプリ
  instead: 社長・番頭・事務員が毎日確認している見えない損失を、初期設定と運用設計込みで見える化する導入パック
  market_boundary:
    - ANDPADのような総合施工管理ではない
    - kintoneのような汎用業務アプリ作成でもない
    - Excel/ホワイトボード以上、総合SaaS未満の現場業務ボード

target:
  primary:
    - ホワイトボード・LINE・Excelで現場予定や持ち出し状況を管理している現場会社
    - 弱電工事会社
    - 電気工事会社
    - 設備工事会社
    - 防犯カメラ・Wi-Fi施工会社
    - 設備保守会社
    - 社員10〜50人規模の現場会社
  first_segment:
    - 社員10〜30人
    - 社長・専務・番頭・事務員が現場予定や工具・車両・日報を直接確認している
    - ホワイトボードが業務の中心になっている
    - 安いスケジュールアプリでは運用が定着しなかった、または導入する余裕がない
  conditions:
    - 予定、日報、工具、車両、アルコールチェック、入出荷、資産管理が分散している
    - 「誰がどこ？」「工具どこ？」「日報出た？」「アルコールチェック済んだ？」が日常的に発生している
    - 見えないことで、探す時間・確認電話・重複購入・記録漏れ・現場停止リスクが発生している

main_pain:
  - 現場予定が最新化されない
  - ホワイトボードを見ないと状況がわからない
  - 社員の予定確認に時間がかかる
  - 工具・機材・部材の所在がわからない
  - 車両やアルコールチェックログの確認が属人化している
  - 日報や申し送りが属人化している
  - 入出荷や資産管理までつながっていない
  - 社長・番頭・事務員の確認作業が毎日発生している

dream_outcome: 明日の現場が回るかを、社長・番頭・事務員が1枚の業務ボードで確認できる状態にする。誰がどこに行き、どの工具・車両を使い、日報や確認ログが出ているかを見える化する。

offer_seed: 30日で、現場会社の「人・モノ・車・報告」の見えないを1枚の業務ボードに集約し、事務所TVとスマホで確認できる状態を作る。

product_family:
  - id: mieru-board
    name: ミエルボード
    role: 人と予定が見える
  - id: mieru-stock
    name: ミエルストック
    role: 工具・機材・部材・車載在庫が見える
  - id: mieru-drive
    name: ミエルドライブ
    role: 車両・運転前確認・アルコールチェックログが見える
  - id: mieru-nippo
    name: ミエル日報
    role: 作業報告・申し送り・未提出が見える

