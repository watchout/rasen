id: haishin-plus
name: 配信プラス
status: candidate
category: event streaming / AV support

one_liner: 初めての配信イベントで起きる業者選び・会場調整・当日トラブルの不安をまとめて解消する配信安心パック。

target:
  primary:
    - 会議室運営会社
    - イベント主催者
    - セミナー運営会社
    - 行政・公的機関イベント担当
    - 企業研修担当
  conditions:
    - 配信イベントを実施したい
    - 会場側との調整に不安がある
    - 音響・映像・ネットワークのトラブルを避けたい

main_pain:
  - 信頼できる配信業者がわからない
  - 会場設備とのすり合わせが面倒
  - 回線、音響、カメラ、登壇者対応が不安
  - 当日の配信事故が怖い
  - 予算化しやすい一式見積がほしい

dream_outcome: 初めての配信イベントでも、事前調整から当日対応まで安心して任せられる状態にする。

offer_seed: 配信業者探し、会場すり合わせ、当日トラブル対応の3つの不安をまとめて解消する配信安心パック。

price_seed:
  package: 300000
  premium: 500000
  currency: JPY

lead_magnet_seed:
  - 配信トラブルリスク診断
  - 初めての配信チェックリスト

backend_seed:
  - 会場向け常設配信パートナー契約
  - 月額配信相談窓口
  - AV設備導入・保守

cta: 配信相談
